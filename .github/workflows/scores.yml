name: Kritik — Canlı Skor Takibi

# Canlı maç skorlarını ve durumlarını (canlı/bitti) SofaScore'dan günceller.
# Tek geçiş yapıp çıkar (--once). GitHub Actions cron ile periyodik tetiklenir.

on:
  schedule:
    - cron: '*/5 * * * *'    # Her 5 dakikada bir
  workflow_dispatch:

jobs:
  sync-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Skorları senkronize et
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python score_watcher.py --once
