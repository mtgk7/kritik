name: Kritik — E2E Testler

# Canlı prod'a karşı smoke/SEO/routing/mobil testleri çalıştırır.
# Deploy git ile tetiklenmediği için: elle + günlük çalışır.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'   # Her gün 07:00 UTC (10:00 TR)

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Playwright chromium yükle
        run: npx playwright install --with-deps chromium

      - name: Testleri çalıştır (canlı prod)
        run: npx playwright test
        env:
          BASE_URL: https://www.analizkritik.com
          CI: 'true'

      - name: Raporu yükle
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
